<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandy's Morning Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh;padding:20px 16px 40px}
h1{font-size:20px;font-weight:600;color:#1d1d1f;margin-bottom:4px}
.date{font-size:13px;color:#888;margin-bottom:24px}
.section{background:white;border-radius:14px;margin-bottom:20px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.section-header{padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px}
.section-title{font-size:15px;font-weight:600;color:#1d1d1f}
.count-badge{background:#f0f0f0;color:#555;border-radius:20px;padding:2px 8px;font-size:12px;font-weight:500;margin-left:auto}
.count-badge.green{background:#e8f5e9;color:#2e7d32}
.count-badge.amber{background:#fff8e1;color:#f57f17}
.job-row{padding:14px 16px;border-bottom:1px solid #f7f7f7;display:flex;align-items:center;gap:12px}
.job-row:last-child{border-bottom:none}
.job-info{flex:1;min-width:0}
.job-title{font-size:14px;font-weight:500;color:#1d1d1f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-co{font-size:12px;color:#888;margin-top:2px}
.score{flex-shrink:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.score.high{background:#e8f5e9;color:#2e7d32}
.score.mid{background:#fff8e1;color:#f57f17}
.score.low{background:#ffebee;color:#c62828}
.btn{flex-shrink:0;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;border:none;cursor:pointer;text-decoration:none;display:inline-block}
.btn-open{background:#007aff;color:white}
.btn-open:hover{background:#0066d6}
.btn-applied{background:#e8f5e9;color:#2e7d32;cursor:default}
.empty{padding:32px 16px;text-align:center;color:#aaa;font-size:14px}
.loading{padding:32px 16px;text-align:center;color:#aaa;font-size:14px}
.error-msg{padding:16px;background:#fff0f0;color:#c62828;font-size:13px;border-radius:8px;margin-bottom:16px;text-align:center}
.refresh{font-size:12px;color:#007aff;background:none;border:none;cursor:pointer;padding:4px;margin-left:8px}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.top-right{text-align:right}
.last-updated{font-size:11px;color:#aaa;margin-top:2px}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Good morning, Sandy</h1>
    <div class="date" id="date-line"></div>
  </div>
  <div class="top-right">
    <button class="refresh" onclick="loadJobs()">Refresh</button>
    <div class="last-updated" id="last-updated"></div>
  </div>
</div>

<div id="error-container"></div>

<div class="section">
  <div class="section-header">
    <span>Bot applied today</span>
    <span class="count-badge green" id="auto-count">—</span>
  </div>
  <div id="auto-list"><div class="loading">Loading...</div></div>
</div>

<div class="section">
  <div class="section-header">
    <span>You need to apply</span>
    <span class="count-badge amber" id="manual-count">—</span>
  </div>
  <div id="manual-list"><div class="loading">Loading...</div></div>
</div>

<script>
const API = 'https://drbabukunadian-production.up.railway.app/jobs';

function scoreClass(s) {
  if (s >= 80) return 'high';
  if (s >= 65) return 'mid';
  return 'low';
}

function jobRow(job, showOpen) {
  const score = job.score || job.match_score || job.fit_score || '—';
  const title = job.title || job.job_title || job.role || 'Unknown Role';
  const company = job.company || job.company_name || '—';
  const url = job.url || job.job_url || job.link || '#';
  const sc = typeof score === 'number' ? score : parseInt(score) || 0;

  return `
    <div class="job-row">
      <div class="score ${scoreClass(sc)}">${sc || '—'}</div>
      <div class="job-info">
        <div class="job-title">${title}</div>
        <div class="job-co">${company}</div>
      </div>
      ${showOpen && url && url !== '#'
        ? `<a class="btn btn-open" href="${url}" target="_blank">Open</a>`
        : showOpen
          ? `<span class="btn btn-open" style="opacity:.4">No URL</span>`
          : `<span class="btn btn-applied">Applied</span>`
      }
    </div>
  `;
}

async function loadJobs() {
  document.getElementById('auto-list').innerHTML = '<div class="loading">Loading...</div>';
  document.getElementById('manual-list').innerHTML = '<div class="loading">Loading...</div>';
  document.getElementById('error-container').innerHTML = '';

  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    const data = await res.json();

    const jobs = Array.isArray(data) ? data : data.jobs || data.data || [];

    if (!jobs.length) {
      document.getElementById('auto-list').innerHTML = '<div class="empty">No jobs found yet</div>';
      document.getElementById('manual-list').innerHTML = '<div class="empty">No jobs waiting</div>';
      document.getElementById('auto-count').textContent = '0';
      document.getElementById('manual-count').textContent = '0';
      return;
    }

    const auto = jobs.filter(j => {
      const s = (j.status || '').toLowerCase();
      const t = (j.apply_type || j.type || '').toLowerCase();
      return s === 'applied' || t === 'auto';
    });

    const manual = jobs.filter(j => {
      const s = (j.status || '').toLowerCase();
      const t = (j.apply_type || j.type || '').toLowerCase();
      return (s === 'pending' || t === 'tap' || t === 'manual') && s !== 'applied';
    });

    document.getElementById('auto-count').textContent = auto.length;
    document.getElementById('manual-count').textContent = manual.length;

    document.getElementById('auto-list').innerHTML = auto.length
      ? auto.map(j => jobRow(j, false)).join('')
      : '<div class="empty">Bot hasn\'t applied to any jobs yet today</div>';

    document.getElementById('manual-list').innerHTML = manual.length
      ? manual.map(j => jobRow(j, true)).join('')
      : '<div class="empty">Nothing waiting for you — great job!</div>';

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});

  } catch (err) {
    document.getElementById('error-container').innerHTML = `
      <div class="error-msg">/jobs endpoint not reachable — ${err.message}<br>Ask Codex to confirm Railway is running.</div>
    `;
    document.getElementById('auto-list').innerHTML = '<div class="empty">—</div>';
    document.getElementById('manual-list').innerHTML = '<div class="empty">—</div>';
    document.getElementById('auto-count').textContent = '0';
    document.getElementById('manual-count').textContent = '0';
  }
}

const now = new Date();
document.getElementById('date-line').textContent = now.toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

loadJobs();
</script>
</body>
</html>
